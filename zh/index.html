        <h2>游戏特色</h2>

        <ul>
          <li>采用 3x2 战场布局的战术战斗系统</li>
          <li>腐化系统会让敌人在战斗中发生异变</li>
          <li>可操作以黄道十二宫为灵感设计的角色</li>
          <li>燃烧、缠绕、荆棘等状态之间的连携效果</li>
          <li>圣物与药剂系统将塑造你的构筑风格</li>
        </ul>
